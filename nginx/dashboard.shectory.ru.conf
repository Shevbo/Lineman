# dashboard.shectory.ru — брендированный вход Shectory (cookie-сессия, не Basic popup).
# Источник истины конфига. Применение (sudo на smain — у Бориса):
#   sudo cp nginx/dashboard.shectory.ru.conf /etc/nginx/sites-available/dashboard.shectory.ru
#   sudo nginx -t && sudo systemctl reload nginx
# Поток: нет сессии → 302 на /login (брендированная страница Lineman) → POST /api/login
# (verify через portal bridge, ставит HttpOnly cookie shectory_session) → доступ.

server {
    listen 80;
    server_name dashboard.shectory.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dashboard.shectory.ru;

    ssl_certificate     /etc/letsencrypt/live/dashboard.shectory.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.shectory.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Проверка cookie-сессии для auth_request: 200 если валидна, 401 иначе.
    location = /_session_check {
        internal;
        proxy_pass http://127.0.0.1:9090/api/session-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Host $host;
    }

    # Публичные эндпоинты входа (БЕЗ auth_request).
    location = /login {
        proxy_pass http://127.0.0.1:9090/login;
        proxy_set_header Host $host;
    }
    location = /api/login {
        proxy_pass http://127.0.0.1:9090/api/login;
        proxy_set_header Host $host;
    }
    location = /api/logout {
        proxy_pass http://127.0.0.1:9090/api/logout;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Telegram Mini App Клода: страница + initData-вход БЕЗ cookie-auth (бутстрапят сессию).
    # Дальнейшие /api/* (inbox, tickets) идут уже с поставленной cookie через общий /api/.
    location = /miniapp {
        proxy_pass http://127.0.0.1:9090/miniapp;
        proxy_set_header Host $host;
    }
    location = /api/tg/miniapp-auth {
        proxy_pass http://127.0.0.1:9090/api/tg/miniapp-auth;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Всё остальное — за cookie-сессией. Нет/невалидна → редирект на брендированный /login.
    location / {
        auth_request /_session_check;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:9090/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }
    location /api/ {
        auth_request /_session_check;
        error_page 401 = @login_redirect;
        proxy_pass http://127.0.0.1:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
        proxy_read_timeout 30;
    }

    location @login_redirect {
        return 302 /login?next=$request_uri;
    }
}
